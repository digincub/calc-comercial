<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Comercial — Digincub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF650E;
  --dark: #1E1E1E;
  --light: #E7E6E4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--light); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

/* Header */
.header { background: var(--dark); padding: 24px 24px 20px; text-align: center; }
.header img { height: 64px; object-fit: contain; margin-bottom: 14px; }
.header p { color: #ffffff; font-size: 14px; margin-top: 2px; }

/* Main layout */
.main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; display: flex; gap: 32px; flex-wrap: wrap; }
.left { flex: 1 1 520px; min-width: 300px; }
.right { flex: 1 1 340px; min-width: 280px; }

/* Slider cards */
.slider-card {
  margin-bottom: 28px; background: #fff; border-radius: 14px;
  padding: 20px 24px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeUp 0.4s ease both;
}
.slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.slider-label { font-weight: 700; font-size: 14px; color: var(--dark); }
.slider-input {
  width: 110px; text-align: center; border: 2px solid var(--orange); border-radius: 8px;
  padding: 4px 8px; font-weight: 700; font-size: 15px; color: var(--orange);
  background: rgba(255,101,14,0.05); font-family: inherit; outline: none;
}
.slider-input.narrow { width: 70px; }
.slider-hint { font-size: 11px; color: #888; margin-top: 2px; text-align: center; }
.derived-badge {
  margin-top: 6px; display: flex; justify-content: center; align-items: center;
}
.derived-badge span {
  font-size: 12px; font-weight: 600; color: var(--orange);
  background: rgba(255,101,14,0.08); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.3px;
}

/* Custom slider */
.slider-track-wrap { position: relative; width: 100%; height: 40px; cursor: pointer; }
.slider-track {
  position: absolute; top: 16px; left: 0; right: 0; height: 8px; border-radius: 4px;
}
.slider-thumb {
  position: absolute; top: 8px; width: 24px; height: 24px; border-radius: 50%;
  background: var(--orange); box-shadow: 0 0 10px rgba(255,101,14,0.4);
  pointer-events: none; transition: left 0.1s;
}
.slider-thumb.dragging { transition: none; }

/* Results panel */
.results-panel {
  background: var(--dark); border-radius: 18px; padding: 24px 20px;
  position: sticky; top: 20px;
}
.results-title {
  text-align: center; margin-bottom: 20px; padding: 10px 0;
  border-bottom: 2px dashed rgba(255,101,14,0.27);
}
.results-title span {
  color: var(--orange); font-weight: 800; font-size: 14px;
  letter-spacing: 2px; text-transform: uppercase;
}
.results-list { display: flex; flex-direction: column; gap: 12px; }
.result-card {
  background: linear-gradient(135deg, #2a2a2a, #222); border-radius: 12px;
  padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
  border-left: 4px solid; animation: fadeUp 0.4s ease both;
}
.result-label { color: #ccc; font-size: 13px; font-weight: 600; }
.result-sub { color: #777; font-size: 10px; margin-top: 2px; }
.result-value { font-weight: 800; font-size: 18px; border-radius: 8px; padding: 2px 6px; }
.result-value.main-value { font-size: 22px; animation: pulseGlow 2s infinite; }

/* Funnel */
.funnel { margin-top: 24px; text-align: center; }
.funnel-title { color: #666; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
.funnel-step {
  margin: 0 auto 4px; border-radius: 6px; padding: 6px 0; transition: width 0.3s ease;
}
.funnel-step span { color: #fff; font-size: 11px; font-weight: 700; }

/* Footer */
.footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulseGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,101,14,0.2); } 50% { box-shadow: 0 0 20px 4px rgba(255,101,14,0.2); } }
</style>
</head>

  const container = document.getElementById('sliders-container');

  sliderConfigs.forEach((config, idx) => {
    const card = document.createElement('div');
    card.className = 'slider-card';
    card.style.animationDelay = (idx * 0.07) + 's';

    // Header row
    const header = document.createElement('div');
    header.className = 'slider-header';

    const label = document.createElement('span');
    label.className = 'slider-label';
    label.textContent = config.label;

    const input = document.createElement('input');
    input.className = 'slider-input' + (config.currency ? '' : ' narrow');
    input.type = 'text';
    input.inputMode = 'decimal';

    function displayInput() {
      if (config.currency) {
        input.value = formatBR(values[config.key]);
      } else {
        input.value = values[config.key];
      }
    }

    input.addEventListener('focus', function() {
      this.value = String(values[config.key]);
    });
    input.addEventListener('blur', function() {
      const parsed = parseFloat(this.value.replace(/\./g, '').replace(',', '.'));
      if (!isNaN(parsed)) {
        values[config.key] = snap(clamp(parsed, config.min, config.max), config.step);
      }
      displayInput();
      updateSliderThumb(config.key);
      recalculate();
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') this.blur();
    });

    header.appendChild(label);
    header.appendChild(input);
    card.appendChild(header);

    // Slider track
    const trackWrap = document.createElement('div');
    trackWrap.className = 'slider-track-wrap';

    const track = document.createElement('div');
    track.className = 'slider-track';
    trackWrap.appendChild(track);

    const thumb = document.createElement('div');
    thumb.className = 'slider-thumb';
    trackWrap.appendChild(thumb);

    card.appendChild(trackWrap);

    // Hint
    if (config.hint) {
      const hint = document.createElement('p');
      hint.className = 'slider-hint';
      hint.textContent = config.hint;
      card.appendChild(hint);
    }

    // Derived badge
    let badgeSpan = null;
    if (derivedMap[config.key]) {
      const badge = document.createElement('div');
      badge.className = 'derived-badge';
      badgeSpan = document.createElement('span');
      badge.appendChild(badgeSpan);
      card.appendChild(badge);
    }

    container.appendChild(card);

    // Store references
    config._track = track;
    config._thumb = thumb;
    config._input = input;
    config._badge = badgeSpan;
    config._trackWrap = trackWrap;
    config._displayInput = displayInput;

    // Slider interaction
    let dragging = false;

    function updateFromX(clientX) {
      const rect = trackWrap.getBoundingClientRect();
      const x = clamp(clientX - rect.left, 0, rect.width);
      const ratio = x / rect.width;
      const raw = config.min + ratio * (config.max - config.min);
      values[config.key] = snap(clamp(raw, config.min, config.max), config.step);
      updateSliderThumb(config.key);
      displayInput();
      recalculate();
    }

    trackWrap.addEventListener('mousedown', function(e) {
      dragging = true;
      thumb.classList.add('dragging');
      updateFromX(e.clientX);
    });
    trackWrap.addEventListener('touchstart', function(e) {
      dragging = true;
      thumb.classList.add('dragging');
      updateFromX(e.touches[0].clientX);
    }, { passive: true });

    document.addEventListener('mousemove', function(e) {
      if (dragging) { e.preventDefault(); updateFromX(e.clientX); }
    });
    document.addEventListener('touchmove', function(e) {
      if (dragging) { updateFromX(e.touches[0].clientX); }
    }, { passive: true });

    function stopDrag() {
      if (dragging) { dragging = false; thumb.classList.remove('dragging'); }
    }
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    displayInput();
  });

  function updateSliderThumb(key) {
    const config = sliderConfigs.find(c => c.key === key);
    if (!config) return;
    const pct = ((values[key] - config.min) / (config.max - config.min)) * 100;
    config._track.style.background = 'linear-gradient(to right, ' + ORANGE + ' ' + pct + '%, #444 ' + pct + '%)';
    config._thumb.style.left = 'calc(' + pct + '% - 12px)';
  }

  // Initial thumb positions
  sliderConfigs.forEach(c => updateSliderThumb(c.key));

  // --- Recalculate ---
  function recalculate() {
    const v = values;
    const leads = Math.floor(v.investimento / v.precoLead);
    const agendamentos = Math.floor(leads * (v.taxaAgendamento / 100));
    const comparecimentos = Math.floor(agendamentos * (v.taxaComparecimento / 100));
    const vendas = Math.floor(comparecimentos * (v.taxaConversao / 100));
    const faturamento = vendas * v.ticketMedio;
    const custoPorCall = comparecimentos > 0 ? v.investimento / comparecimentos : 0;
    const cac = vendas > 0 ? v.investimento / vendas : 0;
    const roas = v.investimento > 0 ? (faturamento - v.investimento) / v.investimento : 0;
    const sdrs = Math.max(1, Math.ceil(leads / 750));
    const closers = Math.max(1, Math.ceil(comparecimentos / 90));

    // Update derived badges
    const derivedValues = {
      precoLead: leads,
      taxaAgendamento: agendamentos,
      taxaComparecimento: comparecimentos,
      taxaConversao: vendas,
    };
    sliderConfigs.forEach(c => {
      if (c._badge && derivedMap[c.key] !== undefined) {
        c._badge.innerHTML = derivedMap[c.key] + ': <strong>' + derivedValues[c.key] + '</strong>';
      }
    });

    // Update results
    const results = [
      { label: 'Faturamento', value: formatCurrency(faturamento), color: ORANGE, isMain: true },
      { label: 'Número de Vendas', value: vendas, color: '#34D399' },
      { label: 'Custo por Call Realizada', value: formatCurrency(custoPorCall), color: '#A78BFA' },
      { label: 'CAC', value: formatCurrency(cac), color: '#60A5FA' },
      { label: 'ROAS', value: roas.toFixed(2), color: '#FBBF24' },
      { label: 'Nº de SDRs', value: sdrs, color: '#F472B6', sub: '750 leads/mês por SDR' },
      { label: 'Nº de Closers', value: closers, color: '#2DD4BF', sub: '90 atendimentos/mês por Closer' },
    ];

    const list = document.getElementById('results-list');
    list.innerHTML = '';
    results.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.borderLeftColor = r.color;
      card.style.animationDelay = (0.3 + i * 0.06) + 's';

      let labelHtml = '<div class="result-label">' + r.label + '</div>';
      if (r.sub) labelHtml += '<div class="result-sub">' + r.sub + '</div>';

      const valEl = document.createElement('div');
      valEl.className = 'result-value' + (r.isMain ? ' main-value' : '');
      valEl.style.color = r.color;
      valEl.style.textShadow = '0 0 12px ' + r.color + '44';
      valEl.textContent = r.value;

      const labelDiv = document.createElement('div');
      labelDiv.innerHTML = labelHtml;

      card.appendChild(labelDiv);
      card.appendChild(valEl);
      list.appendChild(card);
    });

    // Update funnel
    const funnel = document.getElementById('funnel');
    funnel.innerHTML = '<div class="funnel-title">Funil de Vendas</div>';
    const steps = [
      { label: 'Leads', val: leads, w: 100 },
      { label: 'Agendamentos', val: agendamentos, w: 78 },
      { label: 'Comparecimentos', val: comparecimentos, w: 56 },
      { label: 'Vendas', val: vendas, w: 36 },
    ];
    steps.forEach((s, i) => {
      const step = document.createElement('div');
      step.className = 'funnel-step';
      step.style.width = s.w + '%';
      const opA = (30 + i * 20).toString(16).padStart(2, '0');
      const opB = (60 + i * 20).toString(16).padStart(2, '0');
      step.style.background = 'linear-gradient(90deg, ' + ORANGE + opA + ', ' + ORANGE + opB + ')';
      step.innerHTML = '<span>' + s.label + ': ' + s.val + '</span>';
      funnel.appendChild(step);
    });
  }

  // Footer
  document.getElementById('footer').textContent = '© ' + new Date().getFullYear() + ' Digincub — Calculadora Comercial';

  // Initial calculation
  recalculate();
})();
</script>
</body>
